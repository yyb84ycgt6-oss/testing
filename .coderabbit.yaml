# CodeRabbit configuration
# Install the CodeRabbit GitHub App at https://github.com/apps/coderabbitai
# then this file will be picked up automatically.

language: "en-US"

reviews:
  auto_review:
    enabled: true
    drafts: false
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.lock"
    - "!dist/**"
    - "!coverage/**"
  path_instructions:
    - path: "packages/shared/**"
      instructions: |
        Enforce strict security practices: no hardcoded secrets, all config via
        environment variables, input validation on every public function,
        immutable audit records, deny-by-default RBAC.
    - path: "apps/**"
      instructions: |
        Check that every action goes through the shared policy engine,
        emits an audit record, and validates inputs before processing.
        Flag any direct secret access or missing permission checks.

chat:
  auto_reply: true
